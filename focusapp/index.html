<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FocusFlow - Smart Study Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>FocusFlow</h1>
<p class="tag">Smart Study Planner</p>
<p class="creator">Created by S V.SurIya</p>

<div class="box">

<h2>Add Study Task</h2>

<input id="subject" placeholder="Enter subject">

<input id="days" type="number" placeholder="Days until exam">

<input id="hours" type="number" placeholder="Total hours needed">

<button onclick="generatePlan()">Generate Plan</button>

<p id="plan"></p>

</div>

<div class="box">

<h2>Focus Timer</h2>

<p id="timer">25:00</p>

<button onclick="startTimer()">Start Focus</button>

</div>

<div class="box">

<h2>Motivation</h2>

<button onclick="motivate()">Get Motivation</button>

<p id="quote"></p>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
